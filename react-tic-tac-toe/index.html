<!-- Tell browsers to read this file using HTML5 rules -->
<!doctype html>
<html lang="en">
  <head>
    <!-- Tell browsers to read text on this page using UTF-8 character encoding.
     UTF-8 supports almost all characters used across languages, symbols, and emojis -->
    <meta charset="UTF-8" />
    <!-- Tells browsers to set the webpage width equal to the device screen width
     and start zoomed at normal 100% size -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Icon to show in the browser tab. Default path is the public folder within the app -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Page title to show in the browser tab -->
    <title>react-tic-tac-toe</title>
  </head>
  <body>
    <!-- Root element of this app -->
    <div id="root"></div>
    <script type="module" src="./src/index.tsx"></script>
  </body>
</html>
